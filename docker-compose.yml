# Volumes for persistent data
  # ── Speech-to-Text — faster-whisper ─────────────────────────────────────────
  # Start with: docker compose --profile stt up
  # CPU by default (WSL2 / Docker Desktop compatible).
  # For AMD ROCm GPU: docker compose -f docker-compose.yml -f docker-compose.rocm.yml --profile stt up
  # Model is downloaded on first start (~3 GB for large-v3).
  # Set WHISPER_MODEL_SIZE in .env:
  #   Multilingual: tiny | base | small | medium (fast) | large-v3 (best)
  #   English-only: distil-large-v3 (fastest, NOT suitable for non-English)
  faster-whisper:
    profiles: [stt]
    build:
      context: ./services/tts-stt-playground/stt-service
      dockerfile: Dockerfile
    ports:
      - "5002:8000"
    environment:
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-large-v3}
      FORCE_ACCELERATION: ${FORCE_ACCELERATION:-cpu}
    volumes:
      - whisper_cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 3
    networks:
      - project-network

volumes:
  postgres_data:
    driver: local
  keycloak_postgres_data:
    driver: local
  redis_data:
    driver: local
  seaweedfs_data:
    driver: local
  whisper_cache:
    driver: local
  # clamav_data: (commented out as volume is not used if service is disabled)
  #   driver: local

# Network configuration
networks:
  project-network:
    driver: bridge
